<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PSX-Place News</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/favicon/favicon-16x16.png">
    
    <script>
        var isPS3 = /PS3|PlayStation 3|NetFront/i.test(navigator.userAgent) || window.location.search.indexOf("mode=ps3") > -1;
        document.documentElement.className = isPS3 ? "is-ps3" : "is-pc";
    </script>

    <style>
        /* =========================================
           1. CONFIGURAÇÕES GERAIS
           ========================================= */
        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background: rgb(2, 29, 134) url("https://wallpapers.com/images/hd/action-button-icons-blue-background-4k-ps4-eam70vu84a3fhwac.jpg") no-repeat center center;
            background-size: cover; background-attachment: fixed;
            color: #fff; font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            overflow: hidden;
        }

        #news_grid_container { 
            position: absolute; left: 0; right: 0; bottom: 0;
            overflow-y: auto; text-align: center; z-index: 20; 
        }

        .label_preview { color: #ffff00; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .highlight_author { color: #00ccff; font-weight: bold; }
        .highlight_date { color: #ffff00; }
        .button_read_more { background: #007bff; color: #fff; }
        .button_open_forum { background: #6f21c2; color: #fff; }

        /* =========================================
           2. ESTILOS EXCLUSIVOS PC
           ========================================= */
        .is-pc #news_grid_container { top: 115px; }
        .is-pc #main_site_header {
            position: fixed; top: 0; left: 0; right: 0; height: 90px;
            background: rgba(0, 0, 0, 0.35); border-bottom: 2px solid #888;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); text-align: center;
        }
        .is-pc .news_card {
            width: 260px; height: 390px; border-radius: 12px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #555;
            display: inline-block; vertical-align: top; margin: 12px;
            overflow: hidden; text-align: left; position: relative;
        }
        .is-pc #article_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        .is-pc #article_modal.active { display: flex; }
        .is-pc .modal_container { background: #050505; border: 2px solid #00aaff; width: 95%; max-width: 800px; border-radius: 12px; position: relative; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .is-pc .modal_header_section { padding: 15px 50px; text-align: center; }

        /* =========================================
           3. ESTILOS EXCLUSIVOS PS3 (HARDWARE REAL)
           ========================================= */
        .is-ps3 #news_grid_container { top: 115px; }
        .is-ps3 #main_site_header {
            position: absolute; top: 0; left: 0; width: 100%; height: 100px;
            background: rgba(0, 0, 0, 0.35); border-bottom: 2px solid #888;
            z-index: 100; text-align: center;
        }

        .is-ps3 .news_card {
            width: 290px; height: 480px; 
            background: rgba(0, 0, 0, 0.6); border: 2px solid #555;
            text-align: left; position: relative;
            display: inline-block; vertical-align: top; margin: 10px;
            overflow: hidden; /* Corta vazamentos de fundo */
        }

        .is-ps3 .news_card_image { width: 100%; height: 170px; border-bottom: 2px solid #00aaff; }
        .is-ps3 .news_card_title { padding: 10px; font-weight: bold; font-size: 14px; height: 65px; text-align: center; overflow: hidden; }
        .is-ps3 .news_card_excerpt { padding: 10px 15px; font-size: 12px; color: #ddd; height: 180px; overflow: hidden; border-top: 1px solid #333; }
        
        .is-ps3 .news_card_meta { 
            position: absolute; bottom: 52px; left: 0; right: 0;
            font-size: 11px; background: rgba(0,0,0,0.8); padding: 4px 10px;
            text-align: center; border-top: 1px solid #222; z-index: 5;
        }

        .is-ps3 .news_card_buttons { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: #000; text-align: center; }
        .is-ps3 .button_base { display: inline-block; padding: 8px 0; font-size: 12px; font-weight: bold; text-decoration: none; text-align: center; border: 1px solid #555; width: 95%; }
        .is-ps3 .button_open_forum { display: none !important; }

        /* MODAL PS3 CENTRALIZADO */
        .is-ps3 #article_modal {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 150%; background: rgba(0, 0, 0, 0.85); z-index: 200;
        }
        .is-ps3 #article_modal.active { display: block !important; }
        
        .is-ps3 .modal_container {
            background: #050505; border: 2px solid #00aaff;
            width: 650px !important; position: absolute !important;
            left: 50% !important; margin-left: -325px !important;
            top: 10% !important; height: auto !important;
        }

        /* PROTEÇÃO DO TÍTULO NO PS3 */
        .is-ps3 .modal_header_section { 
            text-align: center !important; 
            padding: 20px 65px 5px 65px !important; /* Padding largo para evitar o X */
        }

        .is-ps3 #modal_title {
            color: #00aaff;
            font-size: 18px !important;
            margin: 0 !important;
            line-height: 1.3 !important;
            word-wrap: break-word !important; /* Força quebra de linha */
            display: block !important;
        }

        .is-ps3 #modal_feature_image { width: 100%; max-width: 380px; margin: 15px auto; display: block; }
        .is-ps3 #modal_body_content { padding: 10px 25px 25px 25px; color: #eee; font-size: 14px; text-align: center; }
        
        .is-ps3 #modal_footer_section { display: block !important; padding: 15px; background: #000; text-align: center; }
        .is-ps3 #modal_footer_section::before { 
            content: ""; display: block; height: 1px; background: #fff; 
            margin: 0 auto 15px auto; width: 90%; 
        }

        .is-ps3 .button_close_modal { 
            position: absolute !important; 
            top: 10px !important; 
            right: 10px !important; 
            background: #f00 !important; 
            border: 1px solid #fff !important; 
            color: white !important; 
            padding: 5px 12px !important; 
            font-weight: bold !important; 
            z-index: 210 !important;
        }

    </style>
</head>
<body>

    <header id="main_site_header">
        <div>
            <img src="https://raw.githubusercontent.com/PS3-Pro/PSX-Place/refs/heads/master/resources/logos/logo.png" width="220" style="margin-top: 10px; border-radius:5px;">
            <p style="font-size: 14px; color: #ccc; margin: 5px 0;">Latest Homebrew, Hacking & Scene News</p>
        </div>
    </header>

    <div id="news_grid_container">
        <div id="loading_status" style="margin-top:50px; font-size:20px; color:#00aaff;">Syncing Scene Feed...</div>
    </div>

    <div id="article_modal">
        <div class="modal_container">
            <button class="button_close_modal" onclick="closeArticleModal(); return false;">X</button>
            <div class="modal_header_section">
                <h2 id="modal_title"></h2>
                <div id="modal_meta_info" style="font-size:12px; margin-bottom:10px;"></div>
                <div style="height: 1px; background: #444;"></div>
                <img id="modal_feature_image" src="">
            </div>
            <div id="modal_body_content"></div>
            <div id="modal_footer_section">
                <div id="modal_footer_button_area"></div>
            </div>
        </div>
    </div>

    <script>
        var xml_URL = "https://raw.githubusercontent.com/PS3-Pro/PSX-Place/refs/heads/master/files/whats_new.xml";
        var articlesList = [];

        function formatDateText(rawString) {
            if (!rawString || rawString === "Unknown") return "Unknown Date";
            try {
                var parts = rawString.split('T');
                var dateParts = parts[0].split('-');
                var timeParts = parts[1].split(':');
                var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return monthNames[parseInt(dateParts[1]) - 1] + " " + dateParts[2] + ", " + dateParts[0] + " - " + timeParts[0] + ":" + timeParts[1];
            } catch(e) { return rawString; }
        }

        function downloadXMLFeed() {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) { processXMLData(xhr.responseText); }
            };
            xhr.open("GET", xml_URL, true);
            xhr.send();
        }

        function processXMLData(data) {
            var lines = data.split("\n");
            var currentArticle = null;
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.indexOf("<desc>") != -1) {
                    currentArticle = { title: extractXMLTagContent(line, "<desc>", "</desc>"), img: "", author: "Unknown", date: "Unknown" };
                } else if (line.indexOf('<target type="u">') != -1 && currentArticle) {
                    currentArticle.link = extractXMLTagContent(line, '>', "</target>");
                } else if (line.indexOf("<creators>") != -1 && currentArticle) {
                    currentArticle.author = extractXMLTagContent(line, "<creators>", "</creators>");
                } else if (line.indexOf(' lastm="') != -1 && currentArticle) {
                    currentArticle.date = formatDateText(extractXMLTagContent(line, 'lastm="', '.000Z" until="'));
                } else if (line.indexOf("<description>") != -1 && currentArticle) {
                    var rawDesc = extractXMLTagContent(line, "<description>", "</description>");
                    currentArticle.desc = rawDesc;
                    var imgMatch = rawDesc.match(/src="([^"]+)"/);
                    if(imgMatch) currentArticle.img = imgMatch[1];
                    currentArticle.snippet = removeHTMLTags(rawDesc);
                    articlesList.push(currentArticle);
                }
            }
            buildNewsGrid();
        }

        function extractXMLTagContent(str, startTag, endTag) {
            var startPos = str.indexOf(startTag); 
            if (startPos === -1) return "";
            startPos += startTag.length; 
            var endPos = str.indexOf(endTag, startPos);
            return str.substring(startPos, endPos);
        }

        function removeHTMLTags(htmlString) {
            var tempDiv = document.createElement("div"); 
            tempDiv.innerHTML = htmlString;
            var textOnly = tempDiv.textContent || tempDiv.innerText || "";
            var maxLen = isPS3 ? 200 : 115; 
            return textOnly.length > maxLen ? textOnly.substring(0, maxLen) + "..." : textOnly;
        }

        function buildNewsGrid() {
            var gridContainer = document.getElementById("news_grid_container");
            var outputHTML = "";
            for (var i = 0; i < articlesList.length; i++) {
                var article = articlesList[i];
                outputHTML += '<div class="news_card">' +
                                '<img src="' + article.img + '" class="news_card_image" onclick="openArticleModal(' + i + ')" style="cursor:pointer;">' +
                                '<div class="news_card_title">' + article.title + '</div>' +
                                '<div class="news_card_excerpt">' +
                                    '<span class="label_preview">Preview:</span><br>' + article.snippet + 
                                '</div>' +
                                '<span class="news_card_meta">By <span class="highlight_author">' + article.author + '</span> | <span class="highlight_date">' + article.date + '</span></span>' +
                                '<div class="news_card_buttons">' +
                                    '<a href="javascript:void(0)" onclick="openArticleModal(' + i + ')" class="button_base button_read_more">READ MORE</a>' +
                                    '<a href="' + article.link + '" target="_blank" class="button_base button_open_forum">FORUM</a>' +
                                '</div>' +
                              '</div>';
            }
            gridContainer.innerHTML = outputHTML;
        }

        function openArticleModal(articleIndex) {
            var doc = document;
            var article = articlesList[articleIndex];
            
            doc.getElementById("modal_title").innerHTML = article.title;
            doc.getElementById("modal_meta_info").innerHTML = 'BY <span class="highlight_author">' + article.author.toUpperCase() + '</span> | <span class="highlight_date">' + article.date.toUpperCase() + '</span>';
            doc.getElementById("modal_feature_image").src = article.img;
            
            var rawDesc = article.desc || "";
            doc.getElementById("modal_body_content").innerHTML = rawDesc.replace(/<img[^>]*>/, "");
            
            doc.getElementById("modal_footer_button_area").innerHTML = '<a href="' + article.link + '" target="_blank" class="button_base button_open_forum" style="display:inline-block; width:220px; padding:12px; border:1px solid #fff; background:#6f21c2; color:#fff; text-decoration:none; font-weight:bold;">OPEN FULL THREAD</a>';
            
            var modal_el = doc.getElementById("article_modal");
            if (modal_el) {
                if (isPS3) {
                    var scrollPos = doc.getElementById("news_grid_container").scrollTop || 0;
                    modal_el.style.top = scrollPos + "px";
                }
                modal_el.className = "active";
            }
        }

        function closeArticleModal() {
            var modal_el = document.getElementById("article_modal");
            if (modal_el) {
                modal_el.className = "";
                modal_el.style.display = "none";
            }
        }

        downloadXMLFeed();
    </script>
</body>
</html>
