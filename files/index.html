<html>
<head>
    <meta charset="UTF-8">
    <title>PSX-Place News PRO</title>
    
    <script>
        var isPS3 = /PS3|PlayStation 3|NetFront/i.test(navigator.userAgent) || window.location.search.indexOf("mode=ps3") > -1;
        document.documentElement.className = isPS3 ? "is-ps3" : "is-pc";
    </script>

    <style>
        /* =========================================
           1. BASE & RESET
           ========================================= */
        * { 
            box-sizing: border-box; 
        } 

        html, body {
            margin: 0; 
            padding: 0; 
            height: 100%;
            background: rgb(2, 29, 134) url("https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/background/official.jpg") no-repeat center center;
            background-size: cover; 
            background-attachment: fixed;
            color: #fff; 
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            overflow: hidden;
        }

        #everything { 
            padding: 120px 20px 80px 20px; 
            text-align: center; 
            height: 100vh; 
            overflow-y: auto; 
        }

        .id-text { color: #ffff00; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .meta-card { display: block; margin-top: 6px; padding-top: 6px; border-top: 1px dotted #444; font-size: 11px; }
        .author-hl { color: #00ccff; font-weight: bold; }
        .date-hl { color: #ffff00; }

        .btn-read { background: #007bff; color: #fff; }
        .btn-thread { background: #6f21c2; color: #fff; }

        #m_title { color:#00aaff; font-size: 19px; margin: 0 0 5px 0; }
        #m_meta { font-size: 12px; margin-bottom: 8px; font-weight: bold; }
        
        #m_content p:empty, 
        #m_content div:empty, 
        #m_content span:empty { display: none !important; }
        #m_content p:first-child { margin-top: 0; }
        #m_content p:last-child { margin-bottom: 0; }

        /* =========================================
           2. ESTILOS EXCLUSIVOS PARA PC (MODERNO)
           ========================================= */
        .is-pc #everything::-webkit-scrollbar { width: 8px; }
        .is-pc #everything::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }
        
        .is-pc header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 100px; background: rgba(0, 0, 0, 0.85);
            border-bottom: 2px solid #888; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotate { to { --angle: 360deg; } }
        @keyframes tileReveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .is-pc .tile_wrapper {
            display: inline-block;
            vertical-align: top;
            margin: 15px;
            opacity: 0;
            animation: tileReveal 0.4s ease-out forwards;
        }

        .is-pc .article_tile {
            width: 320px; height: 485px; 
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.8); border: 2px solid #555;
            overflow: hidden; text-align: left; position: relative;
            transition: transform 0.3s ease;
        }

        .is-pc .article_tile:hover {
            transform: translateY(-8px);
            border-color: transparent;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.95)), 
                conic-gradient(from var(--angle), transparent 70%, #00aaff 100%);
            background-origin: padding-box, border-box;
            background-clip: padding-box, border-box;
            animation: rotate 2s linear infinite;
        }

        .is-pc .tile_img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid #00aaff; }
        
        .is-pc .tile_header { 
            background: #000; color: #00aaff; padding: 12px;
            font-weight: bold; font-size: 14px; min-height: 60px;
            display: flex; align-items: center; justify-content: center; text-align: center; 
        }
        
        .is-pc .tile_content { 
            padding: 10px 15px; font-size: 13px; color: #ddd; 
            height: 160px; overflow: hidden; border-top: 1px solid #333; line-height: 1.4;
        }

        .is-pc .links { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 15px 15px 15px; display: flex; gap: 8px; background: rgba(0,0,0,0.6); }
        .is-pc .btn-pro { flex: 1; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-decoration: none; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .is-pc .btn-pro:hover { filter: brightness(1.2); }

        .is-pc #news_modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.97);
            z-index: 200; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        .is-pc #news_modal.active { display: flex; }

        .is-pc .modal_box {
            background: #050505; border: 2px solid #00aaff;
            width: 95%; max-width: 800px; border-radius: 12px;
            position: relative; display: flex; flex-direction: column;
            max-height: 90vh; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.4);
        }

        .is-pc .modal_static_top { flex-shrink: 0; text-align: center; padding: 15px 50px 0 50px; }
        .is-pc #m_static_img { width: 100%; max-width: 450px; max-height: 220px; object-fit: contain; border-radius: 6px; margin: 25px auto; display: block; }
        .is-pc #m_content { padding: 5px 10px 20px 25px; margin-right: 15px; overflow-y: auto; line-height: 1.6; color: #eee; font-size: 14.5px; text-align: center; flex: 1; }
        .is-pc #m_content::-webkit-scrollbar { width: 4px; }
        .is-pc #m_content::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }
        
        .is-pc #modal_footer { padding: 15px; background: #000; text-align: center; position: relative; }
        .is-pc #modal_footer::before { content: ""; position: absolute; top: 0; left: 50px; right: 50px; height: 1px; background: #fff; }
        .is-pc .close_btn { position: absolute; top: 10px; right: 10px; background: #f00; border: 1px solid #fff; color: white; padding: 4px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; z-index: 210; }

        .is-pc .waves { position: fixed; bottom: 0; width: 100%; height: 60px; pointer-events: none; z-index: 50; }
        .is-pc .parallax use { animation: move-wave 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        @keyframes move-wave { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        /* =========================================
           3. ESTILOS EXCLUSIVOS PARA PS3 (SEGURO/LEVE)
           ========================================= */
        .is-ps3 header {
            position: absolute; top: 0; left: 0; width: 100%;
            height: 90px; background: #000;
            border-bottom: 2px solid #888; z-index: 100;
            text-align: center;
        }
        
        .is-ps3 header h1 { margin-top: 25px; display: inline-block; vertical-align: middle; }
        .is-ps3 header img { margin-top: 15px; display: inline-block; vertical-align: middle; }

        .is-ps3 .waves { display: none; }

        .is-ps3 .tile_wrapper {
            display: inline-block;
            vertical-align: top;
            margin: 10px;
        }

        .is-ps3 .article_tile {
            width: 290px; height: 480px; 
            background: #111; border: 2px solid #555;
            text-align: left; position: relative;
        }

        .is-ps3 .article_tile:hover { border-color: #00aaff; }

        /* Altura melhorada, não distorce no PS3 */
        .is-ps3 .tile_img { width: 100%; height: 170px; border-bottom: 2px solid #00aaff; object-fit: cover; }
        
        /* Altura original de volta para não sobrar preto se o título for curto */
        .is-ps3 .tile_header { 
            background: #000; color: #00aaff; padding: 10px;
            font-weight: bold; font-size: 14px; height: 65px; 
            text-align: center; overflow: hidden;
        }
        
        .is-ps3 .tile_content { 
            padding: 10px 15px; font-size: 12px; color: #ddd; 
            height: 195px; overflow: hidden; border-top: 1px solid #333; 
            position: relative; /* <-- NECESSÁRIO PARA PRENDER A DATA NO FUNDO */
        }

        /* O SEGREDO PRA TIRAR O BURACO DA DATA/HORA: Ela fica grudada embaixo do conteúdo */
        .is-ps3 .meta-card { 
            position: absolute; 
            bottom: 10px; 
            left: 15px; 
            right: 15px; 
            margin-top: 0; 
        }

        .is-ps3 .links { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: #000; text-align: center; }
        .is-ps3 .btn-pro { display: inline-block; padding: 8px 0; font-size: 12px; font-weight: bold; text-decoration: none; text-align: center; border: 1px solid #555; }
        
        .is-ps3 .btn-thread { display: none !important; }
        .is-ps3 .btn-read { width: 90%; }

        .is-ps3 #news_modal {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 150%; background: rgba(0,0,0,0.85);
            z-index: 200; text-align: center;
        }
        .is-ps3 #news_modal.active { display: block; }

        /* FIM DO MODAL ESTICADO: O max-width segura ele no meio da tela */
        .is-ps3 .modal_box {
            background: #050505; border: 2px solid #00aaff;
            width: 85%; max-width: 650px; 
            margin: 60px auto; 
            position: relative; text-align: left;
        }

        .is-ps3 .modal_static_top { text-align: center; padding: 15px 40px 0 40px; }
        
        /* Imagem do modal travada em tamanho razoável */
        .is-ps3 #m_static_img { width: 100%; max-width: 380px; max-height: 220px; object-fit: contain; border: 1px solid #333; margin: 15px auto; display: block; }
        
        .is-ps3 #m_content { padding: 15px 25px 25px 25px; color: #eee; font-size: 14px; text-align: center; }
        
        .is-ps3 #modal_footer { display: none !important; }

        .is-ps3 .close_btn { position: absolute; top: 10px; right: 10px; background: #f00; border: 1px solid #fff; color: white; padding: 5px 10px; font-weight: bold; z-index: 210; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/favicon/apple-touch-icon.png" width="55" style="margin-right:15px; border-radius:10px;">
        <h1 style="font-size: 22px; letter-spacing: 2px;">PSX-PLACE SCENE NEWS</h1>
    </header>

    <div id="everything">
        <div id="status" style="margin-top:50px; font-size:20px; color:#00aaff;">Syncing Scene Feed...</div>
    </div>

    <div id="news_modal">
        <div class="modal_box">
            <button class="close_btn" onclick="closeModal()">X</button>
            <div class="modal_static_top">
                <h2 id="m_title"></h2>
                <div id="m_meta"></div>
                <div style="height: 1px; background: #444; margin: 0;"></div>
                <img id="m_static_img" src="">
            </div>
            <div id="m_content"></div>
            <div id="modal_footer"><div id="footer_btn_area"></div></div>
        </div>
    </div>

    <div class="waves">
        <svg viewBox="0 24 150 28" preserveAspectRatio="none" style="width:100%; height:100%;">
            <defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
            <g class="parallax">
                <use href="#gentle-wave" x="48" y="0" fill="rgba(0,108,193,0.7)" />
                <use href="#gentle-wave" x="48" y="3" fill="rgba(0,108,193,0.5)" />
                <use href="#gentle-wave" x="48" y="5" fill="rgba(0,108,193,0.3)" />
                <use href="#gentle-wave" x="48" y="7" fill="#006cc1" />
            </g>
        </svg>
    </div>

    <script>
        var xml_URL = "https://raw.githubusercontent.com/PS3-Pro/PSX-Place/refs/heads/master/files/whats_new.xml";
        var articles = [];

        function formatNewsDate(raw) {
            if (!raw || raw === "Unknown") return "Unknown Date";
            try {
                var parts = raw.split('T');
                var d = parts[0].split('-');
                var t = parts[1].split(':');
                var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return months[parseInt(d[1]) - 1] + " " + d[2] + ", " + d[0] + " - " + t[0] + ":" + t[1];
            } catch(e) { return raw; }
        }

        function fetchNews() {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) { parseXML(xhr.responseText); }
            };
            xhr.open("GET", xml_URL, true);
            xhr.send();
        }

        function parseXML(data) {
            var lines = data.split("\n");
            var current = null;
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.indexOf("<desc>") != -1) {
                    current = { title: extract(line, "<desc>", "</desc>"), img: "https://raw.githubusercontent.com/PS3-Pro/Pages/main/resources/media/psx-place_news.jpg", author: "Unknown", date: "Unknown" };
                } else if (line.indexOf('<target type="u">') != -1 && current) {
                    current.link = extract(line, '>', "</target>");
                } else if (line.indexOf("<creators>") != -1 && current) {
                    current.author = extract(line, "<creators>", "</creators>");
                } else if (line.indexOf(' lastm="') != -1 && current) {
                    current.date = formatNewsDate(extract(line, 'lastm="', '.000Z" until="'));
                } else if (line.indexOf("<description>") != -1 && current) {
                    var rawDesc = extract(line, "<description>", "</description>");
                    current.desc = rawDesc;
                    var imgMatch = rawDesc.match(/src="([^"]+)"/);
                    if(imgMatch) current.img = imgMatch[1];
                    current.snippet = cleanText(rawDesc);
                    articles.push(current);
                }
            }
            renderGrid();
        }

        function extract(str, start, end) {
            var s = str.indexOf(start); if (s === -1) return "";
            s += start.length; var e = str.indexOf(end, s);
            return str.substring(s, e);
        }

        function cleanText(html) {
            var div = document.createElement("div"); div.innerHTML = html;
            var text = div.textContent || div.innerText || "";
            return text.length > 200 ? text.substring(0, 200) + "..." : text;
        }

        function renderGrid() {
            var container = document.getElementById("everything");
            var html = "";
            for (var i = 0; i < articles.length; i++) {
                var art = articles[i];
                html += '<div class="tile_wrapper" style="animation-delay: ' + (i * 0.08) + 's;">' +
                            '<div class="article_tile">' +
                                '<img src="' + art.img + '" class="tile_img" onclick="openModal(' + i + ')" style="cursor:pointer;">' +
                                '<div class="tile_header">' + art.title + '</div>' +
                                '<div class="tile_content">' +
                                    '<span class="id-text">Preview:</span><br>' + art.snippet + 
                                    '<span class="meta-card">By <span class="author-hl">' + art.author + '</span> | <span class="date-hl">' + art.date + '</span></span>' +
                                '</div>' +
                                '<div class="links">' +
                                    '<a href="javascript:void(0)" onclick="openModal(' + i + ')" class="btn-pro btn-read">READ MORE</a>' +
                                    '<a href="' + art.link + '" target="_blank" class="btn-pro btn-thread">FORUM</a>' +
                                '</div>' +
                            '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        function openModal(idx) {
            var art = articles[idx];
            document.getElementById("m_title").innerHTML = art.title;
            document.getElementById("m_meta").innerHTML = 'BY <span class="author-hl">' + art.author.toUpperCase() + '</span> | <span class="date-hl">' + art.date.toUpperCase() + '</span>';
            document.getElementById("m_static_img").src = art.img;
            document.getElementById("m_content").innerHTML = art.desc.replace(/<img[^>]*>/, "").trim();
            document.getElementById("footer_btn_area").innerHTML = '<a href="' + art.link + '" target="_blank" class="btn-pro btn-thread" style="display:inline-block; width:220px; padding:12px; border-color: #fff;">OPEN FULL THREAD</a>';
            
            document.getElementById("news_modal").className = "active";
            document.getElementById("m_content").scrollTop = 0;
        }

        function closeModal() { 
            document.getElementById("news_modal").className = ""; 
        }

        fetchNews();
    </script>
</body>
</html>
