<html>
   <head>
        <title>PSX-Place News</title>    
            <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/PS3-Pro/PSX-Place/master/resources/favicon/apple-touch-icon.png">
            <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/PS3-Pro/PSX-Place/master/resources/favicon/favicon-32x32.png">
            <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/PS3-Pro/PSX-Place/master/resources/favicon/favicon-16x16.png">
        </head>
   <script>
        var isPS3 = /PS3|PlayStation 3|NetFront/i.test(navigator.userAgent) || window.location.search.indexOf("mode=ps3") > -1;
        document.documentElement.className += (isPS3 ? " is-ps3" : " is-pc");

        window.resizeTo(screen.width, screen.height);
    </script>
    <style>
        /* =========================================
           1. GLOBAL
           ========================================= */
        * { box-sizing: border-box; } 

        html, body {
            margin: 0; padding: 0; height: 100%;
            background: rgb(2, 29, 134) url("https://raw.githubusercontent.com/PS3-Pro/PSX-Place/master/resources/background/background.jpg") no-repeat center center;
            background-size: cover;
            color: #fff; font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            overflow: hidden;
            scroll-behavior: smooth;
        }

        #news_grid_container { 
            position: absolute; left: 0; right: 0; bottom: 0; top: 115px;
            overflow-y: auto; text-align: center; z-index: 20;
            -webkit-transform: translateZ(0); transform: translateZ(0);
        }

        .label_preview { color: #FF0000; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .highlight_author { color: #00ccff; font-weight: bold; }
        .highlight_date { color: #FFB347; } 
        .highlight_time { color: #50c878; font-weight: bold; }
        
        .button_read_more { background: #007bff; color: #fff; }
        .button_read_more:hover { background: #0056b3; }
        .button_open_forum { background: #6f21c2; color: #fff; }
        .button_open_forum:hover { background: #56169e; }

        #modal_title { color:#F0E68C; font-size: 19px; margin: 0 0 5px 0; }

        #modal_feature_image { 
            display: block; 
            margin: 25px auto 15px auto;
            max-width: 90%; 
            border-radius: 5px; 
        }

        #modal_meta_info { font-size: 12px; margin-bottom: 8px; font-weight: bold; }
        #modal_body_content p:empty, #modal_body_content div:empty, #modal_body_content span:empty { display: none !important; }
        
        ::-webkit-scrollbar { width: 6px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 2px; }
        ::-webkit-scrollbar-thumb { background: #66ccff; border: 1px solid #00008B; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0000CD; }

        .no-anim {
            animation: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        #scroll-to-bottom, #scroll-to-top {
            position: fixed;
            bottom: 20px;
            padding: 5px 12px;
            color: white;
            background: rgba(0, 0, 0, 0.5) !important;
            font-weight: bold;
            border: 2px solid #888;
            border-radius: 8px;
            cursor: pointer;
            z-index: 30;
            transition: 0.2s;
        }

        #scroll-to-top { left: 10px; bottom: 25px; } /* Lado Esquerdo */
        #scroll-to-bottom { right: 15px; bottom: 25px; } /* Lado Direito */

        /* =========================================
           2. PC ADJUSTIMENTS
           ========================================= */
        .is-pc body { background-attachment: fixed; }
        .is-pc #news_grid_container::-webkit-scrollbar { width: 8px; }
        .is-pc #news_grid_container::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }
        .is-pc #news_grid_container { backdrop-filter: blur(5px);}
        
        .is-pc #main_site_header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 90px; background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #888; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); text-align: center;
        }

        .is-pc #scroll-to-bottom:hover,
        .is-pc #scroll-to-top:hover {
            border-color: #00aaff;
            transform: scale(1.1);
        }

        .is-pc .button_base:hover {
            transform: scale(1.05);
        }

        @property --angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes rotate { to { --angle: 360deg; } }
        @keyframes tileReveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .is-pc .news_card_wrapper { display: inline-block; vertical-align: top; margin: 12px; width: 260px; opacity: 0; animation: tileReveal 0.4s ease-out forwards; }
        .is-pc .news_card {
            width: 100%; height: 390px; border-radius: 12px;
            background: rgba(8, 16, 32, 1);
            border: 2px solid #555;
            overflow: hidden; text-align: left; position: relative;
            transition: transform 0.3s ease;
        }

        .is-pc .news_card:hover {
            transform: translateY(-8px); border-color: transparent;
            background-image: linear-gradient(rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.95)), conic-gradient(from var(--angle), transparent 70%, #00aaff 100%);
            background-origin: padding-box, border-box; background-clip: padding-box, border-box;
            animation: rotate 2s linear infinite;
        }

        .is-pc .news_card_image { width: 100%; height: 145px; object-fit: cover; border-bottom: 2px solid #00aaff; cursor: pointer; }
        .is-pc .news_card_title { padding: 10px; font-weight: bold; font-size: 13px; background: rgba(0,0,0,0.6); color: #F0E68C; height: 55px; display: flex; align-items: center; text-align: center; overflow: hidden; }
        .is-pc .news_card_excerpt { padding: 10px; font-size: 12px; color: #ddd; height: 135px; overflow: hidden; border-top: 1px solid #333; line-height: 1.4; }
        .is-pc .news_card_meta { position: absolute; bottom: 52px; left: 0; right: 0; font-size: 11px; background: rgba(0,0,0,0.8); padding: 5px; text-align: center; border-top: 1px dotted #444; }
        .is-pc .news_card_buttons { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; display: flex; gap: 6px; background: rgba(0,0,0,0.6); }
        .is-pc .button_base { flex: 1; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-decoration: none; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }

        .is-pc #article_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .is-pc #article_modal.active { display: flex; }
        .is-pc .modal_container { background: #050505; border: 2px solid #00aaff; width: 95%; max-width: 800px; border-radius: 12px; position: relative; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .is-pc .modal_header_section { flex-shrink: 0; text-align: center; padding: 15px 50px 0 50px; }
        .is-pc #modal_body_content { padding: 5px 10px 20px 25px; margin-right: 15px; overflow-y: auto; line-height: 1.6; color: #eee; font-size: 14.5px; text-align: center; flex: 1; }
        .is-pc #modal_footer_section { padding: 15px; background: #000; text-align: center; position: relative; }
        .is-pc #modal_footer_section::before { content: ""; position: absolute; top: 0; left: 50px; right: 50px; height: 1px; background: #444; }
        .is-pc .button_close_modal { position: absolute; top: 10px; right: 10px; background: #f00; border: 1px solid #fff; color: white; padding: 4px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; z-index: 210; }

        /* =========================================
           3. PS3 ADJUSTIMENTS
           ========================================= */
        .is-ps3 body { background-attachment: scroll !important; }
        .is-ps3 #main_site_header { position: absolute; top: 0; left: 0; width: 100%; height: 100px; background: rgba(0, 0, 0, 0.7); border-bottom: 2px solid #888; z-index: 100; text-align: center; }
        .is-ps3 .background_waves { display: none; }
        .is-ps3 .news_card_wrapper { display: inline-block; vertical-align: top; margin: 10px; }
        
        .is-ps3 .news_card { width: 290px; height: 480px; background: #111; border: 2px solid #555; text-align: left; position: relative; overflow: hidden; transition: border-color 0.2s; }
        .is-ps3 .news_card:hover { border-color: #00aaff; }
        
        .is-ps3 .news_card_image { width: 100%; height: 170px; border-bottom: 2px solid #00aaff; object-fit: cover; cursor: pointer; }
        .is-ps3 .news_card_title { padding: 10px; margin-bottom: -10px; background: #000; color: #F0E68C; font-weight: bold; font-size: 14px; height: 55px; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .is-ps3 .news_card_excerpt { padding: 10px 15px; font-size: 12px; color: #ddd; height: 180px; overflow: hidden; border-top: 1px solid #333; }
        .is-ps3 .news_card_meta { position: absolute; bottom: 52px; left: 0; right: 0; font-size: 11px; background: rgba(0,0,0,0.9); padding: 4px 10px; text-align: center; border-top: 1px solid #222; }
        .is-ps3 .news_card_buttons { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: #000; text-align: center; }
        .is-ps3 .button_base { display: inline-block; padding: 8px 0; font-size: 12px; font-weight: bold; text-decoration: none; text-align: center; border: 1px solid #555; width: 95%; transition: 0.2s; }
        .is-ps3 .button_open_forum { display: none !important; }

        .is-ps3 #scroll-to-bottom:hover, 
        .is-ps3 #scroll-to-top:hover {
            border-color: #00aaff;
        }

        .is-ps3 .scroll-btn { width: 40px; height: 40px; line-height: 35px; font-size: 18px; }
        .is-ps3 #scroll-to-top { left: 15px; bottom: 20px; }
        .is-ps3 #scroll-to-bottom { right: 15px; bottom: 20px; }

        .is-ps3 #article_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; text-align: center; }
        .is-ps3 #article_modal.active { display: table !important; }
        .is-ps3 .modal_wrap_ps3 { display: table-cell; vertical-align: middle; width: 100%; height: 100%; }
        .is-ps3 .modal_container { display: inline-block; background: #050505; border: 2px solid #00aaff; width: 650px !important; position: relative !important; margin: 0 auto !important; text-align: left; height: auto !important; float: none; }
        .is-ps3 .modal_header_section { text-align: center; padding: 20px 60px 5px 60px; }
        .is-ps3 #modal_title { font-size: 18px; line-height: 1.3; margin-bottom: 15px; word-wrap: break-word; color: #F0E68C; }
        .is-ps3 #modal_feature_image { width: 100%; max-width: 380px; margin: 15px auto; display: block; }
        .is-ps3 #modal_body_content { padding: 15px 25px 25px 25px; color: #eee; font-size: 14px; text-align: center; }
        .is-ps3 #modal_footer_section { display: block !important; padding: 15px; background: #000; text-align: center; }
        .is-ps3 #modal_footer_section::before { content: ""; display: block; height: 1px; background: #444; margin: 0 auto 15px auto; width: 90%; }
        .is-ps3 .button_close_modal { position: absolute; top: 10px; right: 10px; background: #f00; border: 1px solid #fff; color: white; padding: 5px 10px; font-weight: bold; z-index: 210; }

        .background_waves { position: fixed; bottom: 0; width: 100%; height: 60px; pointer-events: none; z-index: 10; }
    </style>
    <body>
        <header id="main_site_header">
            <div>
                <img src="https://raw.githubusercontent.com/PS3-Pro/PSX-Place/refs/heads/master/resources/logos/logo.png" width="220" style="margin-right:15px; margin-top: 10px; margin-bottom: -10px; border-radius:5px;">
                <p style="font-size: 16px; margin: 8px 0 5px 0; color: #ccc;">PSX-Place.com - Latest Homebrew & Scene News</p>
            </div>
        </header>
    
        <div id="news_grid_container">
            <div id="loading_status" style="margin-top:50px; font-size:20px; color:#00aaff;">Syncing Scene Feed...</div>
        </div>
    
        <div id="scroll-to-top" onclick="scrollToTop()">&#8593;</div>
        <div id="scroll-to-bottom" onclick="scrollToBottom()">&#8595;</div>

        <div id="article_modal">
            <div class="modal_wrap_ps3"> <div class="modal_container">
                    <button class="button_close_modal" onclick="closeArticleModal(); return false;">X</button>
                    <div class="modal_header_section">
                        <h2 id="modal_title"></h2>
                        <div style="height: 1px; background: #444; margin: 0;"></div>
                        <img id="modal_feature_image" src="">
                    </div>
                    <div id="modal_body_content"></div>
                    <div id="modal_footer_section">
                        <div id="modal_meta_info"></div>
                        <div id="modal_footer_button_area"></div>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="background_waves">
            <svg viewBox="0 24 150 28" preserveAspectRatio="none" style="width:100%; height:100%;">
                <defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
                <g class="parallax">
                    <use href="#gentle-wave" x="48" y="0" fill="rgba(0,108,193,0.7)" />
                    <use href="#gentle-wave" x="48" y="3" fill="rgba(0,108,193,0.5)" />
                    <use href="#gentle-wave" x="48" y="5" fill="rgba(0,108,193,0.3)" />
                    <use href="#gentle-wave" x="48" y="7" fill="#006cc1" />
                </g>
            </svg>
        </div>
    <script>
        var G_EMPTY_GIF = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
        var xml_URL = "https://raw.githubusercontent.com/PS3-Pro/PSX-Place/refs/heads/master/files/whats_new.xml";
        var articlesList = [];
        var animCutoffFound = false;

        var g_imageQueue = [];
        var g_isProcessingQueue = false;
        var g_isAutoScrolling = false; 

        function formatDateText(rawString) {
            if (!rawString || rawString === "Unknown") return "Unknown Date";
            try {
                var parts = rawString.split('T');
                var dateParts = parts[0].split('-');
                var timeParts = parts[1].split(':');
                var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return monthNames[parseInt(dateParts[1]) - 1] + " " + dateParts[2] + ", " + dateParts[0] + " - " + timeParts[0] + ":" + timeParts[1];
            } catch(e) { return rawString; }
        }

        function downloadXMLFeed() {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) { processXMLData(xhr.responseText); }
            };
            xhr.open("GET", xml_URL, true);
            xhr.send();
        }

        function processXMLData(data) {
            var lines = data.split("\n");
            var currentArticle = null;
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.indexOf("<desc>") != -1) {
                    currentArticle = { 
                        title: extractXMLTagContent(line, "<desc>", "</desc>"), 
                        img: "https://raw.githubusercontent.com/PS3-Pro/Pages/main/resources/media/psx-place_news.jpg", 
                        author: "Unknown", date: "Unknown" 
                    };
                } else if (line.indexOf('<target type="u">') != -1 && currentArticle) {
                    currentArticle.link = extractXMLTagContent(line, '>', "</target>");
                } else if (line.indexOf("<creators>") != -1 && currentArticle) {
                    currentArticle.author = extractXMLTagContent(line, "<creators>", "</creators>");
                } else if (line.indexOf(' lastm="') != -1 && currentArticle) {
                    currentArticle.date = formatDateText(extractXMLTagContent(line, 'lastm="', '.000Z" until="'));
                } else if (line.indexOf("<description>") != -1 && currentArticle) {
                    var rawDesc = extractXMLTagContent(line, "<description>", "</description>");
                    currentArticle.desc = rawDesc;
                    var imgMatch = rawDesc.match(/src="([^"]+)"/);
                    if(imgMatch) currentArticle.img = imgMatch[1];
                    currentArticle.snippet = removeHTMLTags(rawDesc);
                    articlesList.push(currentArticle);
                }
            }
            buildNewsGrid();
        }

        function extractXMLTagContent(str, startTag, endTag) {
            var startPos = str.indexOf(startTag); 
            if (startPos === -1) return "";
            startPos += startTag.length; 
            var endPos = str.indexOf(endTag, startPos);
            return str.substring(startPos, endPos);
        }

        function removeHTMLTags(htmlString) {
            var tempDiv = document.createElement("div"); 
            tempDiv.innerHTML = htmlString;
            var textOnly = tempDiv.textContent || tempDiv.innerText || "";
            var maxLen = isPS3 ? 310 : 115; 
            return textOnly.length > maxLen ? textOnly.substring(0, maxLen) + "..." : textOnly;
        }

        function buildNewsGrid() {
            var gridContainer = document.getElementById("news_grid_container");
            var outputHTML = "";
            for (var i = 0; i < articlesList.length; i++) {
                var article = articlesList[i];
                var finalImgUrl = isPS3 ? article.img.replace('/uncompressed/', '/compressed/') : article.img.replace('/compressed/', '/uncompressed/');
                var dateParts = article.date.split(" - ");
                
                outputHTML += '<div class="news_card_wrapper" style="animation-delay: ' + (i * 0.08) + 's;">' +
                                '<div class="news_card">' +
                                    '<img src="' + G_EMPTY_GIF + '" data-src="' + finalImgUrl + '" class="news_card_image" onclick="openArticleModal(' + i + ')">' +
                                    '<div class="news_card_title">' + article.title + '</div>' +
                                    '<div class="news_card_excerpt"><span class="label_preview">Preview:</span><br>' + article.snippet + '</div>' +
                                    '<span class="news_card_meta">By <span class="highlight_author">' + article.author + '</span> | ' +
                                    '<span class="highlight_date">' + dateParts[0] + '</span> <span style="color: #fff;">-</span> ' +
                                    '<span class="highlight_time">' + (dateParts[1] || "") + '</span></span>' +
                                    '<div class="news_card_buttons">' +
                                        '<a href="javascript:void(0)" onclick="openArticleModal(' + i + ')" class="button_base button_read_more">READ MORE</a>' +
                                        '<a href="' + article.link + '" target="_blank" class="button_base button_open_forum">FORUM</a>' +
                                    '</div>' +
                                '</div>' +
                            '</div>';
            }
            gridContainer.innerHTML = outputHTML;

            var v_h = window.innerHeight;
            var cards = document.querySelectorAll('.news_card_wrapper');
            animCutoffFound = false;

            for (var t = 0; t < cards.length; t++) {
                if (animCutoffFound) {
                    cards[t].className += ' no-anim';
                } else {
                    var rect = cards[t].getBoundingClientRect();
                    if (rect.top > v_h) {
                        animCutoffFound = true;
                        cards[t].className += ' no-anim';
                    }
                }
            }

            var scrollTimer = null;
            gridContainer.addEventListener('scroll', function() {
                if(scrollTimer) clearTimeout(scrollTimer);
                scrollTimer = setTimeout(manageImagesRAM, 50);
            });

            setTimeout(manageImagesRAM, 200); 
        }

        function scrollToTop() {
            var s_cont = document.getElementById("news_grid_container");
            if (!s_cont) return;

            if (!isPS3) {
                g_isAutoScrolling = true; 
                s_cont.scrollTo({ top: 0, behavior: 'smooth' });

                var checkTop = setInterval(function() {
                    if (s_cont.scrollTop <= 10) {
                        g_isAutoScrolling = false;
                        clearInterval(checkTop);
                    }
                }, 30);

                setTimeout(function() { g_isAutoScrolling = false; clearInterval(checkTop); }, 1500); 
            } else {
                s_cont.scrollTop = 0;
            }
        }

        function scrollToBottom() {
            var s_cont = document.getElementById("news_grid_container");
            if (!s_cont) return;

            var maxScroll = s_cont.scrollHeight - s_cont.clientHeight;

            if (!isPS3) {
                g_isAutoScrolling = true; 
                s_cont.scrollTo({ top: maxScroll, behavior: 'smooth' });

                var checkBottom = setInterval(function() {
                    if (s_cont.scrollTop >= maxScroll - 15) {
                        g_isAutoScrolling = false;
                        clearInterval(checkBottom);
                    }
                }, 50);

                setTimeout(function() { g_isAutoScrolling = false; clearInterval(checkBottom); }, 1500);
            } else {
                s_cont.scrollTop = maxScroll;
            }
        }

        function manageImagesRAM() {
            var v_h = window.innerHeight;
            var cards = document.querySelectorAll('.news_card_wrapper');
            
            var buffer = isPS3 ? 200 : 1500; 

            for (var i = 0; i < cards.length; i++) {
                var img = cards[i].querySelector('.news_card_image');
                var rect = cards[i].getBoundingClientRect();
                var target = img.getAttribute('data-src');

                if (rect.bottom > -buffer && rect.top < v_h + buffer) {
                    if (!isPS3) {
                        if (img.src !== target) {
                            img.src = target;
                        }
                    } else {
                        var isLoading = img.getAttribute('data-loading');
                        if (img.src !== target && isLoading !== 'true') {
                            img.setAttribute('data-loading', 'true');
                            g_imageQueue.push({ el: img, src: target });
                        }
                    }
                } else {
                    if (isPS3 && img.src !== G_EMPTY_GIF) {
                        img.src = G_EMPTY_GIF;
                        img.removeAttribute('data-loading');
                    }
                }
            }

            if (isPS3 && g_imageQueue.length > 0 && !g_isProcessingQueue) {
                processImageQueue();
            }
        }

        function processImageQueue() {
			if (g_imageQueue.length === 0) {
				g_isProcessingQueue = false;
				return;
			}

			g_isProcessingQueue = true;
			var item = g_imageQueue.shift(); 

			var rect = item.el.getBoundingClientRect();
			var v_h = window.innerHeight;
			var buffer = 200; 

			if (rect.bottom > -buffer && rect.top < v_h + buffer) {
				item.el.onload = item.el.onerror = function() {
					this.removeAttribute('data-loading');
				};
				item.el.src = item.src;

				setTimeout(processImageQueue, 30);
			} else {
				item.el.removeAttribute('data-loading');
				processImageQueue();
			}
		}

        function openArticleModal(articleIndex) {
            var article = articlesList[articleIndex];
            var modal_el = document.getElementById("article_modal");
            document.getElementById("modal_title").innerHTML = article.title;
            var dateParts = article.date.split(" - ");
            document.getElementById("modal_meta_info").innerHTML = 'By <span class="highlight_author">' + article.author + '</span> | <span class="highlight_date">' + dateParts[0] + '</span> <span style="color: #fff;">-</span> <span class="highlight_time">' + (dateParts[1] || "") + '</span>';
            document.getElementById("modal_feature_image").src = article.img;
            document.getElementById("modal_body_content").innerHTML = (article.desc || "").replace(/<img[^>]*>/, "");
            document.getElementById("modal_footer_button_area").innerHTML = isPS3 ? "" : '<a href="' + article.link + '" target="_blank" class="button_base button_open_forum" style="display:inline-block; width:220px; padding:12px; border-color: #fff;">OPEN FULL THREAD</a>';
            modal_el.style.display = isPS3 ? "table" : "flex";
            modal_el.className = "active";
            document.getElementById("modal_body_content").scrollTop = 0;
        }

        function closeArticleModal() {
            var modal_el = document.getElementById("article_modal");
