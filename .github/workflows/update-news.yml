name: Update PSX-Place News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python .github/scripts/scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          git add PSX_Place/PS3/news_page_code.html
          
          if ! git diff --cached --exit-code --quiet; then
            echo "Changes detected! Committing now..."
            git commit -m "Auto-update: PSX-Place News"
            git push
          else
            echo "No changes found. Skipping commit and push."
          fi