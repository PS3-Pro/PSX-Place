name: Update PSX-Place News Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required dependencies
        run: pip install curl_cffi beautifulsoup4

      - name: Run the PSX-Place Scraper
        run: python .github/scripts/scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          
          # Stage the specific folders for commit
          git add files/
          git add resources/images/
          
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Auto-update: PSX-Place News feed"
            git push
          else
            echo "No changes to commit"
          fi