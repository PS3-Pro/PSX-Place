name: Update PSX-Place News Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-update:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 Pillow

      - name: Run the PSX-Place Scraper
        run: python .github/scripts/scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          
          # Adiciona o XML e as pastas de imagens (uncompressed e compressed)
          git add files/
          git add resources/images/uncompressed/
          git add resources/images/compressed/
          
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Auto-update: PSX-Place News feed (Images Optimized)"
            git pull origin master --rebase
            git push origin master
          else
            echo "No changes to commit"
          fi